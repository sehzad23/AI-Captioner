<!doctype html>
<html lang="en">
  <head>
    <!-- Basic SEO -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon_new.png" />

    <!-- Primary SEO Title + Description -->
    <title>AI Image Captioner | Generate Smart Captions from Images Instantly</title>

    <meta
      name="description"
      content="AI Image Captioner helps you generate accurate and creative captions from any image instantly using advanced artificial intelligence. Upload photos and get smart image descriptions in seconds."
    />

    <meta
      name="keywords"
      content="AI Image Captioner, Image Caption Generator, AI Caption Tool, Photo Caption AI, Generate Captions from Images, AI Photo Description, Image to Text AI"
    />

    <meta name="author" content="Your Name" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://yourdomain.com/" />

    <!-- Open Graph (Facebook / LinkedIn / WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="AI Image Captioner | Smart Captions from Images" />
    <meta
      property="og:description"
      content="Upload any image and let AI generate meaningful captions instantly. Fast, accurate, and easy to use."
    />
    <meta property="og:url" content="https://yourdomain.com/" />
    <meta property="og:site_name" content="AI Image Captioner" />
    <meta property="og:image" content="https://yourdomain.com/og-image.jpg" />
    <meta property="og:image:alt" content="AI Image Captioner Preview" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AI Image Captioner | Generate Captions Instantly" />
    <meta
      name="twitter:description"
      content="Turn images into smart captions with AI. Upload your photo and get instant results."
    />
    <meta name="twitter:image" content="https://yourdomain.com/og-image.jpg" />

    <!-- Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="//fonts.googleapis.com" />

    <!-- Schema Markup -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "AI Image Captioner",
        "url": "https://yourdomain.com/",
        "description": "Generate captions from images instantly using AI technology.",
        "applicationCategory": "AI Tool",
        "operatingSystem": "All",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
